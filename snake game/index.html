<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNAKE ULTRA-INSTINCT | NEON EDITION</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-blue: #00f2ff;
            --neon-pink: #ff007f;
            --bg-dark: #05050a;
            --glass: rgba(0, 242, 255, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        @keyframes backgroundMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        body {
            background: linear-gradient(-45deg, #05050a, #0a1128, #05050a);
            background-size: 400% 400%;
            animation: backgroundMove 15s ease infinite;
            color: white;
            font-family: 'Rajdhani', sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .scanlines {
            position: fixed; inset: 0;
            background: linear-gradient(to bottom, transparent 50%, rgba(0,0,0,0.3) 51%);
            background-size: 100% 4px;
            z-index: 300; pointer-events: none; opacity: 0.15;
        }

        #ui-wrapper {
            display: grid;
            grid-template-columns: 220px 1fr 220px;
            gap: 20px;
            width: 98vw;
            height: 90vh;
            max-width: 1400px;
            z-index: 10;
        }

        .side-panel { display: flex; flex-direction: column; justify-content: center; }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 242, 255, 0.2);
            padding: 15px;
            margin-bottom: 20px;
            clip-path: polygon(0 0, 100% 0, 100% 80%, 85% 100%, 0 100%);
        }

        .label { font-size: 12px; letter-spacing: 2px; color: var(--neon-blue); font-weight: bold; }
        .value { font-family: 'Orbitron', sans-serif; font-size: 24px; margin-top: 5px; text-shadow: 0 0 10px var(--neon-blue); }

        #game-viewport {
            position: relative;
            border: 2px solid rgba(0, 242, 255, 0.3);
            background: #000;
            overflow: hidden;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.8);
        }

        canvas { width: 100%; height: 100%; display: block; }

        .overlay {
            position: absolute; inset: 0;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.9);
            z-index: 100; backdrop-filter: blur(12px);
            transition: 0.5s;
        }

        .hidden { display: none !important; opacity: 0; }

        .glitch {
            font-size: 3.5rem;
            font-family: 'Orbitron';
            color: white;
            text-shadow: 3px 0 0 var(--neon-pink), -3px 0 0 var(--neon-blue);
            margin-bottom: 20px;
            text-align: center;
        }

        .cyber-btn {
            padding: 15px 40px;
            background: transparent;
            border: 2px solid var(--neon-blue);
            color: var(--neon-blue);
            font-family: 'Orbitron', sans-serif;
            cursor: pointer;
            transition: 0.3s;
            letter-spacing: 2px;
            box-shadow: 0 0 15px var(--neon-blue);
        }

        .cyber-btn:hover { background: var(--neon-blue); color: black; box-shadow: 0 0 35px var(--neon-blue); }

        #combo-meter {
            text-align: center;
            color: var(--neon-pink);
            display: none;
            animation: pulse 0.5s infinite alternate;
        }

        @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.1); } }

        .combo-val { font-size: 3.5rem; font-family: 'Orbitron'; text-shadow: 0 0 20px var(--neon-pink); }
    </style>
</head>
<body>
    <div class="scanlines"></div>

    <div id="ui-wrapper">
        <div class="side-panel left">
            <div class="glass-card">
                <span class="label">STATUS</span>
                <div class="value" id="lvl-display">LVL 01</div>
            </div>
            <div class="glass-card" style="border-left: 4px solid var(--neon-pink);">
                <span class="label">SCORE</span>
                <div class="value" id="score-display">0000</div>
            </div>
        </div>

        <div id="game-viewport">
            <canvas id="c"></canvas>
            
            <div id="start-screen" class="overlay">
                <h1 class="glitch">ULTRA_SNAKE</h1>
                <p style="color: var(--neon-blue); margin-bottom: 20px;">NEON PROTOCOL ACTIVATED</p>
                <button class="cyber-btn" onclick="game.start()">INITIALIZE</button>
            </div>

            <div id="game-over" class="overlay hidden">
                <h1 class="glitch" style="color: var(--neon-pink);">SYSTEM_CRASH</h1>
                <div class="value" id="final-score" style="margin-bottom: 20px; font-size: 3rem;">0000</div>
                <button class="cyber-btn" onclick="location.reload()">REBOOT SYSTEM</button>
            </div>
        </div>

        <div class="side-panel right">
            <div class="glass-card">
                <span class="label">RECORD</span>
                <div class="value" id="best-display">0000</div>
            </div>
            <div id="combo-meter">
                <div class="combo-val">x<span id="combo-num">1</span></div>
                <div class="label">COMBO MULTIPLIER</div>
            </div>
        </div>
    </div>

    <script src="scripts.js"></script>
</body>
</html>
